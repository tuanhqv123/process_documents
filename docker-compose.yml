services:
  db:
    image: pgvector/pgvector:pg16
    container_name: pdf-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pdf_processor
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pdf-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: pdf-backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/pdf_processor
      REDIS_URL: redis://redis:6379
      EMBEDDING_SERVICE_URL: http://host.docker.internal:8001
      WHISPER_SERVICE_URL: http://host.docker.internal:8002
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./api:/app/api
      - ./data:/app/data
    ports:
      - "8000:8000"
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:20-alpine
    container_name: pdf-frontend
    working_dir: /app
    depends_on:
      - backend
    volumes:
      - ./web:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_PROXY_TARGET: http://pdf-backend:8000
    command: sh -c "npm install && npx vite --host 0.0.0.0 --port 5173"

  whisper:
    build:
      context: .
      dockerfile: whisper/Dockerfile
    container_name: pdf-whisper
    volumes:
      - ./whisper/main.py:/app/main.py
      - whisper_cache:/root/.cache
    ports:
      - "8002:8002"
    command: uvicorn main:app --host 0.0.0.0 --port 8002 --reload

volumes:
  postgres_data:
  whisper_cache:
  frontend_node_modules:
